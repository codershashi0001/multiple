<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
        }
.ball{
    height: 21px;
    width: 21px;
    /* border-radius: 50px;
    background-color: red; */
    position: absolute;
     background: gold;

   clip-path: polygon(
        50% 0%, 61% 35%, 98% 35%, 
        68% 57%, 79% 91%, 
        50% 70%, 21% 91%, 
        32% 57%, 2% 35%, 
        39% 35%
    );

    animation: sparkle 50s ease-out forwards;
}

@keyframes sparkle {
    0% {
        transform: scale(0.5) rotate(0deg);
        opacity: 1;
        box-shadow: 0 0 5px gold;
    }

    50% {
        transform: scale(1.3) rotate(180deg);
        box-shadow: 0 0 20px gold;
    }

    100% {
        transform: scale(0.5) rotate(360deg);
        opacity: 0;
        box-shadow: 0 0 0px gold;
    }
}

.main2{
    background-color: black;
    color: white;
    height: 85px;
    width: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    left: 50%;
    top: 42%;
    position: absolute;
}  
.main{
    display: none;
}

</style>

</head>
<body>
    <div class="main2">
            <p>0</p>
            <input type="button" value="generate" id="btn" >
            </div>
    <div class="main"> 
        <div class="ball"></div>

</body>
</html>
