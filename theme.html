<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <Style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;
        }
.main{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100%;
    width: 100%;
    overflow: hidden;
    gap: 10px;
    background-color: white;
    color: black;
}

#change{
    height: 3em;
    width: 5em;
    border-radius: 5px;
    background-color: rgb(133, 12, 12);
    cursor: pointer;
    color: white;
    font-weight: 500;
}
#change:hover{
    background-color: red;
}


    </Style>
</head>
<body>
    <div class="main">
    <h1>Change Theme</h1>
    <input type="button" value="change" id="change">
    </div>
    
    <script src="./theme.js"></script>
</body>
</html>
